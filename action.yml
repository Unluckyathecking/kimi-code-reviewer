name: 'Kimi Code Reviewer'
description: 'AI-powered code review using Moonshot Kimi with 256K context window'
author: 'howardpen9'

branding:
  icon: 'eye'
  color: 'blue'

inputs:
  kimi_api_key:
    description: 'Kimi API key from kimi.com/code/console (sk-kimi-...) or Moonshot Platform (sk-...)'
    required: true
  github_token:
    description: 'GitHub token for API access'
    required: false
    default: ${{ github.token }}
  model:
    description: 'Kimi model ID — use kimi-for-coding against api.kimi.com/coding/v1'
    required: false
    default: 'kimi-for-coding'
  base_url:
    description: 'Kimi API base URL. Default api.kimi.com/coding/v1 (Kimi For Coding).'
    required: false
    default: 'https://api.kimi.com/coding/v1'
  language:
    description: 'Review comment language (en, zh-TW, zh-CN, ja, ko)'
    required: false
    default: 'en'
  fail_on:
    description: 'Fail the check on: critical, warning, never'
    required: false
    default: 'critical'
  config_path:
    description: 'Path to config file (relative to repo root)'
    required: false
    default: '.kimi-review.yml'
  autofix:
    description: 'When the review flags critical/warning issues, ask Kimi to generate a patch, apply it, and push the commit back to the PR branch (true/false).'
    required: false
    default: 'true'
  max_autofix_iterations:
    description: 'Maximum number of autofix commits per PR branch before bailing out and leaving it to the next reviewer.'
    required: false
    default: '10'

outputs:
  review_summary:
    description: 'The review summary text'
  annotations_count:
    description: 'Number of annotations created'
  critical_count:
    description: 'Number of critical issues found'
  tokens_used:
    description: 'Total tokens used'
  cost_estimate:
    description: 'Estimated API cost in USD'
  autofix_outcome:
    description: 'One of: skipped, applied, noop, merge-suggested, errored'

runs:
  using: 'node20'
  main: 'action/dist/index.js'
